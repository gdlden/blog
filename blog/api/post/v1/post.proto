syntax = "proto3";

package post.v1;

import "google/api/annotations.proto";

option go_package = "blog/api/post/v1;v1";
option java_multiple_files = true;
option java_package = "dev.kratos.api.post.v1";
option java_outer_classname = "PostProtoV1";

service Post {
  rpc CreatePost (AddPostRequest) returns (AddPostReply) {
    option (google.api.http) = {
      post: "/post/add/v1"
      body: "*"
    };
  }
  rpc GetPostPage (PostPageRequest) returns (PostPageReply) {
    option (google.api.http) = {
      get: "/post/page/v1"
    };
  }
  // rpc EditPostById (HelloRequest) returns (HelloReply) {
  //   option (google.api.http) = {
  //     post: "/post/edit/v1"
  //     body: "*"
  //   };
  // }
  // rpc DeletePostById (HelloRequest) returns (HelloReply) {
  //   option (google.api.http) = {
  //     post: "/post/delete/v1/{id}"
  //   };
  // }
  rpc GetPostById (GetPostByIdRequest) returns (GetPostByIdReply) {
    option (google.api.http) = {
      get: "/post/get/{id}"
    };
  }
}

message AddPostRequest {
  string title =1;
  string content = 2;
}

message AddPostReply {
  string id = 1;
  string title = 2;
  string content = 3;
}

message PostEntity {
  string id=1;
  string title=2;
  string content=3;
}

message PostPageRequest {
  string current = 1;
  string size = 2;
  string title = 3;
  string content = 4;
}
message PostPageReply {
  string current = 1;
  string size = 2;
  string total = 3;
  repeated PostEntity data =4;
}
message GetPostByIdRequest {
  string id = 1;
}
message GetPostByIdReply {
  string id = 1;
  string title = 2;
  string content = 3;
}