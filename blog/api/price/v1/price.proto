syntax = "proto3";

package price.v1;

import "google/api/annotations.proto";

option go_package = "price/api/price/v1;v1";

service Price {
	rpc CreatePrice (CreatePriceRequest) returns (CreatePriceReply) {
		option (google.api.http) = {
			post: "/price/add/v1"
			body: "*"
		};
	}
	rpc UpdatePrice (UpdatePriceRequest) returns (UpdatePriceReply) {
		option (google.api.http) = {
			put: "/price/{id}/v1"
			body: "*"
		};
	}
	rpc ListPrice (ListPriceRequest) returns (ListPriceReply) {
		option (google.api.http) = {
			get: "/price/page/v1"
		};
	}
	rpc PagePrice (ListPriceRequest) returns (PagePriceReply) {
		option (google.api.http) = {
			get: "/price/list/v1"
		};
	}
	rpc DeletePrice (DeletePriceRequest) returns (DeletePriceReply) {
		option (google.api.http) = {
			post: "/price/{id}/delete/v1"
		};
	}
	rpc GetPrice (GetPriceRequest) returns (GetPriceReply) {
		option (google.api.http) = {
			get: "/price/{id}/v1"
		};
	}
}

message CreatePriceRequest {
	string productName = 1;
	string weight = 2;
	string unitPrice = 3;
	string priceDate = 4;
}
message CreatePriceReply {
	string id = 1;
}

message UpdatePriceRequest {
  uint32 id = 1;
  string productName = 2;
  string weight = 3;
  string unitPrice = 4;
  string priceDate = 5;
}
message UpdatePriceReply {
  PriceInfo info = 1;
}

message DeletePriceRequest {
  int64 id = 1;
}
message DeletePriceReply {}

message GetPriceRequest {
  uint32 id = 1;
}
message GetPriceReply {
  PriceInfo info = 1;
}

message PriceInfo {
  uint32 id = 1;
  string productName = 2;
  string weight = 3;
  string unitPrice = 4;
  string totalPrice = 5;
  string priceDate = 6;
}

message ListPriceRequest {
  string current = 1;
  string size = 2;
}
message ListPriceReply {
  repeated PriceInfo list = 1;
}
message PagePriceReply {
  string current = 1;
  string size = 2;
  string total = 3;
  repeated PriceInfo data = 4;
}
